<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://via.placeholder.com/1600x900?text=Welcome+Background') no-repeat center center/cover;
            color: white;
            text-align: center;
        }

        .welcome-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.5);
        }

        .welcome-container h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .welcome-container p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #d3d3d3;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .button {
            text-decoration: none;
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            border-radius: 5px;
            background: #3498db;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            background: #2980b9;
            box-shadow: 0px 6px 8px rgba(0, 0, 0, 0.5);
        }

        .sign-in {
            margin-top: 20px;
            font-size: 1rem;
        }

        .sign-in a {
            text-decoration: none;
            color: #f1c40f;
            font-weight: bold;
        }

        .sign-in a:hover {
            color: #d4ac0d;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome to My Website</h1>
        <p>Your journey to explore amazing content begins here. Dive into a world of knowledge and inspiration!</p>
        <div class="button-container">
            <a href="main.html" class="button">Info</a>
            <a href="main.html" class="button">Explore</a>
        </div>
        <div class="sign-in">
            <p>Already a member? <a href="signin.html">Sign In</a></p>
        </div>
    </div>
    <style>
        body {
            background: url('https://via.placeholder.com/1600x900?text=Welcome+Background') no-repeat center center/cover;
        }
    </style>
</body>
</html>
